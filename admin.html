<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Midnight Loadboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a12;color:#e0e0e0;font-family:Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{color:#555;font-size:14px;margin-bottom:32px}
.login-box{background:#12121e;border:1px solid #2a2a3e;border-radius:12px;padding:32px;width:100%;max-width:400px;margin-bottom:32px}
.login-box h2{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
input,select,textarea{background:#0a0a12;border:1px solid #2a2a3e;border-radius:8px;color:#e0e0e0;font-size:14px;padding:11px 14px;width:100%;outline:none;margin-bottom:12px;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#5c5cff}
select option{background:#0a0a12}
textarea{min-height:80px;resize:vertical}
label{font-size:12px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{font-size:14px;font-weight:700;padding:11px 24px;border-radius:8px;border:none;cursor:pointer;width:100%}
.btn-green{background:#4caf50;color:#fff}
.btn-green:hover{background:#5cbf60}
.btn-blue{background:#5c5cff;color:#fff}
.btn-blue:hover{background:#7070ff}
.btn-red{background:transparent;color:#cf6679;border:1px solid #3a1d1d;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;width:auto}
.btn-red:hover{background:#1a0f0f}
#admin-panel{display:none;width:100%;max-width:860px}
.section{background:#12121e;border:1px solid #2a2a3e;border-radius:12px;padding:28px;margin-bottom:24px}
.section h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:20px}
.load-row{border:1px solid #2a2a3e;border-radius:8px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.load-row-info h4{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.load-row-info p{font-size:13px;color:#888}
.load-rate-badge{font-size:18px;font-weight:800;color:#4caf50}
.msg{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.msg-green{background:#0f1a0f;border:1px solid #1d3a1d;color:#4caf50}
.msg-red{background:#1a0f0f;border:1px solid #3a1d1d;color:#cf6679}
#loads-list{min-height:60px}
.empty{color:#555;font-size:14px;text-align:center;padding:24px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.load-row{flex-direction:column}}
</style>
</head>
<body>
<h1>🚛 Midnight Loadboard Admin</h1>
<p class="subtitle">Post and manage loads. Password protected.</p>

<div class="login-box" id="login-box">
  <h2>Enter Admin Password</h2>
  <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
  <button class="btn btn-blue" onclick="login()">Sign In</button>
  <div class="msg msg-red" id="pw-error">Incorrect password.</div>
</div>

<div id="admin-panel">
  <div class="section">
    <h2>Post a New Load</h2>
    <div class="msg msg-green" id="post-success">✓ Load posted successfully!</div>
    <div class="msg msg-red" id="post-error">Error posting load. Try again.</div>
    <div class="form-row">
      <div><label>Pickup City &amp; State</label><input type="text" id="pickup" placeholder="e.g. Durango, CO"/></div>
      <div><label>Delivery City &amp; State</label><input type="text" id="delivery" placeholder="e.g. Albuquerque, NM"/></div>
    </div>
    <div class="form-row">
      <div><label>Pickup Date</label><input type="date" id="pickup_date"/></div>
      <div><label>Equipment Type</label>
        <select id="equipment">
          <option value="" disabled selected>Select equipment</option>
          <option>Dry Van</option><option>Flatbed</option><option>Reefer</option><option>Tanker</option><option>Step Deck</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Weight (lbs)</label><input type="text" id="weight" placeholder="e.g. 38,000"/></div>
      <div><label>Commodity</label><input type="text" id="commodity" placeholder="e.g. Beer / Beverage"/></div>
    </div>
    <div class="form-row">
      <div><label>Rate</label><input type="text" id="rate" placeholder="e.g. $1,150"/></div>
      <div><label>Payment</label>
        <select id="payment">
          <option value="" disabled selected>Select payment</option>
          <option>Net 7 (Standard)</option><option>USDM Stablecoin</option>
        </select>
      </div>
    </div>
    <label>Notes</label>
    <textarea id="notes" placeholder="Hazmat, special handling, dock hours, etc."></textarea>
    <button class="btn btn-green" onclick="postLoad()">Post Load</button>
  </div>

  <div class="section">
    <h2>Active Loads</h2>
    <div id="loads-list"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zfpznsxrwjhcmhcoseue.supabase.co';
const SUPABASE_KEY = 'sb_secret_ETlonFZdy7af9GSa2SUZIg__pw7gED5';
const ADMIN_PASSWORD = 'MidnightAdmin2024!';

function login() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadLoads();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
  }
}

async function postLoad() {
  const pickup = document.getElementById('pickup').value.trim();
  const delivery = document.getElementById('delivery').value.trim();
  const pickup_date = document.getElementById('pickup_date').value;
  const equipment = document.getElementById('equipment').value;
  const rate = document.getElementById('rate').value.trim();
  if (!pickup || !delivery || !pickup_date || !equipment || !rate) {
    alert('Please fill in pickup, delivery, date, equipment, and rate.');
    return;
  }
  const body = {
    pickup, delivery, pickup_date, equipment, rate,
    weight: document.getElementById('weight').value,
    commodity: document.getElementById('commodity').value,
    payment: document.getElementById('payment').value,
    notes: document.getElementById('notes').value,
    status: 'open'
  };
  const resp = await fetch(SUPABASE_URL + '/rest/v1/loads', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
  if (resp.ok) {
    document.getElementById('post-success').style.display = 'block';
    setTimeout(() => document.getElementById('post-success').style.display = 'none', 3000);
    ['pickup','delivery','pickup_date','weight','commodity','rate','notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('equipment').selectedIndex = 0;
    document.getElementById('payment').selectedIndex = 0;
    loadLoads();
  } else {
    document.getElementById('post-error').style.display = 'block';
  }
}

async function loadLoads() {
  const resp = await fetch(SUPABASE_URL + '/rest/v1/loads?status=eq.open&order=created_at.desc', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const loads = await resp.json();
  const el = document.getElementById('loads-list');
  if (!loads.length) { el.innerHTML = '<div class="empty">No active loads.</div>'; return; }
  el.innerHTML = loads.map(l => `
    <div class="load-row">
      <div class="load-row-info">
        <h4>${l.pickup} → ${l.delivery}</h4>
        <p>${l.equipment} · ${l.weight || ''} · Pickup: ${l.pickup_date}</p>
        <p style="color:#888;font-size:12px;margin-top:4px">${l.commodity || ''} ${l.notes ? '· ' + l.notes : ''}</p>
      </div>
      <div style="text-align:right">
        <div class="load-rate-badge">${l.rate}</div>
        <div style="font-size:12px;color:#5c5cff;margin-bottom:8px">${l.payment || ''}</div>
        <button class="btn-red" onclick="deleteLoad('${l.id}')">Remove Load</button>
      </div>
    </div>
  `).join('');
}

async function deleteLoad(id) {
  if (!confirm('Remove this load?')) return;
  await fetch(SUPABASE_URL + '/rest/v1/loads?id=eq.' + id, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  loadLoads();
}
</script>
</body>
</html>
