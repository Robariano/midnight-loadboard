<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint TCT · Midnight Loadboard Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 16px; padding: 2rem; width: 100%; max-width: 520px; }
h1 { font-size: 1.4rem; font-weight: 800; color: #a78bfa; margin-bottom: 0.4rem; }
.sub { color: #64748b; font-size: 0.88rem; margin-bottom: 2rem; }
.field { margin-bottom: 1.2rem; }
label { display: block; font-size: 0.8rem; color: #64748b; font-weight: 600; margin-bottom: 0.4rem; }
input { width: 100%; background: #12121f; border: 1px solid #2a2a45; border-radius: 8px; padding: 0.65rem 0.9rem; color: #e2e8f0; font-size: 0.9rem; outline: none; }
input:focus { border-color: #7c3aed; }
.btn { width: 100%; padding: 0.75rem; border-radius: 8px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 0.8rem; }
.btn-purple { background: #7c3aed; color: #fff; }
.btn-purple:hover { background: #6d28d9; }
.btn:disabled { opacity: 0.4; cursor: default; }
.status { background: #12121f; border: 1px solid #2a2a45; border-radius: 8px; padding: 1rem; font-size: 0.85rem; line-height: 1.8; margin-top: 1rem; display: none; word-break: break-all; }
.status.show { display: block; }
.highlight { color: #10b981; font-weight: 700; font-family: monospace; }
.error { color: #ef4444; }
.warn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 0.8rem; font-size: 0.82rem; color: #f59e0b; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <h1>🎖️ Mint Trucker Credential Token</h1>
  <p class="sub">Admin tool · Preprod testnet only</p>
  <div class="warn">
    ⚠️ After minting, copy the <b>Policy ID</b> and paste into <code>index.html</code> as <code>CRED_POLICY_ID</code>.
  </div>
  <div class="field">
    <label>Trucker Name (goes on-chain)</label>
    <input type="text" id="trucker-name" value="Robert Ariano">
  </div>
  <button class="btn btn-purple" id="connect-btn" onclick="window._mintTCT()">Connect Wallet &amp; Mint TCT</button>
  <div class="status" id="status"></div>
</div>

<script>
const BLOCKFROST_URL = 'https://cardano-preprod.blockfrost.io/api/v0';
const BLOCKFROST_KEY = 'preprodIn7U7hLcUwtizoVFX1sYIOnPVCHI2HHf';
const CSL_CDNS = [
  'https://esm.sh/@emurgo/cardano-serialization-lib-browser',
  'https://esm.sh/@emurgo/cardano-serialization-lib-browser@12.0.0',
];
function hexToBytes(hex) {
  const b = new Uint8Array(hex.length/2);
  for (let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.slice(i,i+2),16);
  return b;
}
function bytesToHex(b) {
  return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function errMsg(e) {
  if (!e) return 'unknown error';
  if (typeof e==='string') return e;
  if (e.message) return e.message;
  if (e.info) return String(e.info);
  try { return JSON.stringify(e); } catch { return String(e); }
}
const $s = () => document.getElementById('status');
function log(msg, cls='') {
  const el=$s(); el.classList.add('show');
  el.innerHTML += '<div'+(cls?' class="'+cls+'"':'')+'>'+msg+'</div>';
}
function setBtn(t,d=false){const b=document.getElementById('connect-btn');b.textContent=t;b.disabled=d;}
async function bf(path) {
  const r=await fetch(BLOCKFROST_URL+path,{headers:{project_id:BLOCKFROST_KEY}});
  if(!r.ok){let d=r.statusText;try{const j=await r.json();d=j.message||j.error||d;}catch{}throw new Error('Blockfrost '+path+': '+r.status+' - '+d);}
  return r.json();
}
async function loadCSL() {
  for (const cdnUrl of CSL_CDNS) {
    try {
      const host = new URL(cdnUrl).hostname;
      log('  -> fetching from ' + host + '...');
      const resp = await fetch(cdnUrl);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      log('  -> ' + Math.round(text.length/1024) + 'KB loaded, importing via blob...');
      const blob = new Blob([text], { type: 'text/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      const mod = await import(blobUrl);
      URL.revokeObjectURL(blobUrl);
      if (typeof mod.default === 'function') await mod.default();
      if (!mod.BigNum) throw new Error('BigNum not found');
      log('OK CSL ready from ' + host);
      return mod;
    } catch(e) {
      log('  x ' + errMsg(e));
    }
  }
  throw new Error('All CDNs failed.');
}
window._mintTCT = async function () {
  setBtn('Working...', true);
  $s().innerHTML = '';
  $s().classList.add('show');
  try {
    log('Loading Cardano Serialization Lib...');
    const CSL = await loadCSL();
    log('Looking for Cardano wallet...');
    const cardano = window.cardano || {};
    const wKey = ['lace','eternl','nami','flint','yoroi'].find(k=>cardano[k]?.enable)??Object.keys(cardano).find(k=>typeof cardano[k]?.enable==='function');
    if (!wKey) throw new Error('No Cardano wallet found.');
    const api = await cardano[wKey].enable();
    log('OK ' + wKey + ' connected');
    const usedAddrs = await api.getUsedAddresses();
    const unusedAddrs = await api.getUnusedAddresses();
    const addrHex = (usedAddrs&&usedAddrs.length)?usedAddrs[0]:(unusedAddrs&&unusedAddrs[0]);
    if (!addrHex) throw new Error('Wallet returned no addresses');
    const addr = CSL.Address.from_bytes(hexToBytes(addrHex));
    const addrBech32 = addr.to_bech32();
    log('OK Address: ' + addrBech32.slice(0,22) + '...');
    const baseAddr = CSL.BaseAddress.from_address(addr);
    if (!baseAddr) throw new Error('Address is not a base address');
    const pkh = baseAddr.payment_cred().to_keyhash();
    const nativeScript = CSL.NativeScript.new_script_pubkey(CSL.ScriptPubkey.new(pkh));
    const policyId = bytesToHex(nativeScript.hash(CSL.ScriptHashNamespace.NativeScript).to_bytes());
    log('Policy ID: ' + policyId);
    const truckerName = document.getElementById('trucker-name').value.trim()||'Robert';
    const tokenNameStr = 'TCT-'+truckerName;
    const assetName = CSL.AssetName.new(new TextEncoder().encode(tokenNameStr));
    log('Token: ' + tokenNameStr);
    log('Fetching UTxOs...');
    const [utxosData,params] = await Promise.all([bf('/addresses/'+addrBech32+'/utxos'),bf('/epochs/latest/parameters')]);
    if (!utxosData||!utxosData.length) throw new Error('No UTxOs. Send tADA first.');
    log('OK ' + utxosData.length + ' UTxO(s)');
    log('Building transaction...');
    const coinsPerByte = CSL.BigNum.from_str((params.coins_per_utxo_size||params.coins_per_utxo_word||4310).toString());
    let cfgBuilder = CSL.TransactionBuilderConfigBuilder.new()
      .fee_algo(CSL.LinearFee.new(CSL.BigNum.from_str(params.min_fee_a.toString()),CSL.BigNum.from_str(params.min_fee_b.toString())))
      .pool_deposit(CSL.BigNum.from_str((params.pool_deposit||500000000).toString()))
      .key_deposit(CSL.BigNum.from_str((params.key_deposit||2000000).toString()))
      .max_value_size(parseInt(params.max_val_size||5000))
      .max_tx_size(parseInt(params.max_tx_size||16384));
    try{cfgBuilder=cfgBuilder.coins_per_utxo_byte(coinsPerByte);}catch{cfgBuilder=cfgBuilder.coins_per_utxo_word(coinsPerByte);}
    const txBuilder = CSL.TransactionBuilder.new(cfgBuilder.build());
    const unspentOutputs = CSL.TransactionUnspentOutputs.new();
    for (const u of utxosData) {
      const lovelace=(u.amount.find(a=>a.unit==='lovelace')||{}).quantity||'0';
      unspentOutputs.add(CSL.TransactionUnspentOutput.new(CSL.TransactionInput.new(CSL.TransactionHash.from_bytes(hexToBytes(u.tx_hash)),u.output_index),CSL.TransactionOutput.new(addr,CSL.Value.new(CSL.BigNum.from_str(lovelace)))));
    }
    let strat=CSL.CoinSelectionStrategyCIP2.LargestFirstMultiAsset;
    if(strat===undefined)strat=CSL.CoinSelectionStrategyCIP2.LargestFirst;
    txBuilder.add_inputs_from(unspentOutputs,strat);
    const mintBuilder=CSL.MintBuilder.new();
    mintBuilder.add_asset(CSL.MintWitness.new_native_script(nativeScript),assetName,CSL.Int.new_i32(1));
    txBuilder.set_mint_builder(mintBuilder);
    txBuilder.add_required_signer(pkh);
    txBuilder.add_change_if_needed(addr);
    const txBody=txBuilder.build();
    log('Requesting wallet signature...');
    setBtn('Sign in Lace...',true);
    const emptyTx=CSL.Transaction.new(txBody,CSL.TransactionWitnessSet.new());
    const witnessHex=await api.signTx(bytesToHex(emptyTx.to_bytes()),true);
    const signedTx=CSL.Transaction.new(txBody,CSL.TransactionWitnessSet.from_bytes(hexToBytes(witnessHex)));
    log('Submitting...');
    setBtn('Submitting...',true);
    const txHash=await api.submitTx(bytesToHex(signedTx.to_bytes()));
    log('TCT MINTED! TX: ' + txHash);
    log('CRED_POLICY_ID = "' + policyId + '"  <- paste into index.html');
    setBtn('Done!',true);
  } catch(e) {
    log('ERROR: '+errMsg(e),'error');
    console.error(e);
    setBtn('Retry',false);
  }
};
</script>
</body>
</html>
