<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mint TCT - Midnight Loadboard</title>
<style>
  body{background:#0a0a12;color:#e0e0e0;font-family:Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  h1{font-size:24px;color:#fff;margin-bottom:8px}
  .policy{font-size:11px;color:#555;word-break:break-all;max-width:540px;margin:0 auto 32px}
  button{background:#5c5cff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;padding:14px 32px;cursor:pointer;transition:background 0.15s}
  button:hover{background:#7070ff}
  button:disabled{background:#333;color:#666;cursor:not-allowed}
  #status{margin-top:24px;font-size:14px;min-height:24px;line-height:1.6;max-width:540px}
  .ok{color:#4caf50}
  .err{color:#cf6679}
  .tx{font-size:11px;word-break:break-all;background:#0f1a0f;border:1px solid #1d3a1d;border-radius:6px;padding:12px;margin-top:12px;color:#4caf50}
</style>
</head>
<body>
<h1>Mint TCT Token</h1>
<div class="policy">Policy: 5235fad075cb36cc19084a3e97ae1fe61410bc7272578075f8491b0b</div>
<button id="btn" onclick="mint()">Mint TCT with Lace</button>
<div id="status"></div>

<script type="module">
import {Lucid, Blockfrost, fromText} from 'https://esm.sh/lucid-cardano@0.10.7';

const POLICY_ID = '5235fad075cb36cc19084a3e97ae1fe61410bc7272578075f8491b0b';
const BF_KEY = 'preprodIn7U7hLcUwtizoVFX1sYIOnPVCHI2HHf';

function status(msg, cls) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = cls || '';
}

window.mint = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  try {
    status('Initializing Lucid…');
    const lucid = await Lucid.new(
      new Blockfrost('https://cardano-preprod.blockfrost.io/api/v0', BF_KEY),
      'Preprod'
    );

    if (!window.cardano?.lace) {
      status('Lace wallet not found. Make sure Lace is installed and on Preprod.', 'err');
      btn.disabled = false;
      return;
    }

    status('Connecting to Lace…');
    lucid.selectWallet(window.cardano.lace);

    const addr = await lucid.wallet.address();
    const {paymentCredential} = lucid.utils.getAddressDetails(addr);
    const pkh = paymentCredential.hash;
    status('PKH: ' + pkh);

    const mintingPolicy = lucid.utils.nativeScriptFromJson({type: 'sig', keyHash: pkh});
    const policyId = lucid.utils.mintingPolicyToId(mintingPolicy);

    if (policyId !== POLICY_ID) {
      status('Policy ID mismatch!<br>Expected: ' + POLICY_ID + '<br>Got: ' + policyId, 'err');
      btn.disabled = false;
      return;
    }

    status('Policy ID verified ✓<br>Building transaction…');

    const unit = policyId + fromText('TCT');
    const tx = await lucid.newTx()
      .mintAssets({[unit]: 1n})
      .attachMintingPolicy(mintingPolicy)
      .complete();

    status('Please approve in Lace…');
    const signed = await tx.sign().complete();

    status('Submitting…');
    const hash = await signed.submit();

    status('✓ TCT minted!<div class="tx">TX: ' + hash + '</div>', 'ok');
  } catch(e) {
    status('Error: ' + e.message, 'err');
    btn.disabled = false;
  }
};
</script>
</body>
</html>
