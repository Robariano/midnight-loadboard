<button id="btn" onclick="mint()">Mint TCT with Lace</button>

<script>
// ── No external libraries. Pure JS CBOR transaction builder. ──

const POLICY_ID      = '5235fad075cb36cc19084a3e97ae1fe61410bc7272578075f8491b0b';
const BF_URL         = 'https://cardano-preprod.blockfrost.io/api/v0';
const BF_KEY         = 'preprodIn7U7hLcUwtizoVFX1sYIOnPVCHI2HHf';
const TOKEN_LOVELACE = 2000000; // min-UTXO for token output (2 ADA)
const FEE            = 200000;  // flat fee (0.2 ADA; safely above min for this tx)

const fromHex = h => Uint8Array.from(h.match(/.{1,2}/g), b => parseInt(b,16));
const toHex   = b => Array.from(b, x => x.toString(16).padStart(2,'0')).join('');

// ── CBOR encoder ──────────────────────────────────────────────
function cat(...a){
  let n=0; for(const x of a) n+=x.length;
  const r=new Uint8Array(n); let o=0;
  for(const x of a){r.set(x,o);o+=x.length;}
  return r;
}
function hdr(maj,n){
  const b=maj<<5;
  if(n<24)      return new Uint8Array([b|n]);
  if(n<256)     return new Uint8Array([b|24,n]);
  if(n<65536)   return new Uint8Array([b|25,n>>8,n&0xff]);
  return new Uint8Array([b|26,(n>>>24)&0xff,(n>>16)&0xff,(n>>8)&0xff,n&0xff]);
}
const eu = n => hdr(0,n);
const eb = b => cat(hdr(2,b.length), b);
const ea = a => cat(hdr(4,a.length), ...a);
const em = ps => cat(hdr(5,ps.length), ...ps.map(([k,v])=>cat(k,v)));
// tagged set #6.258 (Conway sets)
const es = a => cat(new Uint8Array([0xd9,0x01,0x02]), ea(a));
// signed int (for mint quantity)
const ei = n => { if(n>=0) return eu(n); const r=eu(-1-n); r[0]|=0x20; return r; };
// CBOR simple values
const CTRUE  = new Uint8Array([0xf5]);
const CNULL  = new Uint8Array([0xf6]);

// ── CBOR decoder (minimal – only needed to parse UTxO + witness set) ──
function dec(buf, p){
  const b=buf[p], maj=b>>5, inf=b&0x1f;
  let n,e;
  if(inf<24){n=inf;e=p+1;}
  else if(inf===24){n=buf[p+1];e=p+2;}
  else if(inf===25){n=(buf[p+1]<<8)|buf[p+2];e=p+3;}
  else if(inf===26){n=(buf[p+1]*16777216)+(buf[p+2]<<16)+(buf[p+3]<<8)+buf[p+4];e=p+5;}
  else if(inf===27){
    n=Number((BigInt(buf[p+1])<<56n)|(BigInt(buf[p+2])<<48n)|(BigInt(buf[p+3])<<40n)|
      (BigInt(buf[p+4])<<32n)|(BigInt(buf[p+5])<<24n)|(BigInt(buf[p+6])<<16n)|
      (BigInt(buf[p+7])<<8n)|BigInt(buf[p+8]));e=p+9;}
  else throw new Error('CBOR additional info '+inf+' not supported');
  if(maj===0) return [n,e];
  if(maj===1) return [-(n+1),e];
  if(maj===2) return [buf.slice(e,e+n),e+n];
  if(maj===3) return [new TextDecoder().decode(buf.slice(e,e+n)),e+n];
  if(maj===4){const r=[];let p2=e;for(let i=0;i<n;i++){const[v,p3]=dec(buf,p2);r.push(v);p2=p3;}return[r,p2];}
  if(maj===5){const r={};let p2=e;for(let i=0;i<n;i++){const[k,p3]=dec(buf,p2);const[v,p4]=dec(buf,p3);r[k]=v;p2=p4;}return[r,p2];}
  if(maj===6) return dec(buf,e); // skip tag, decode inner
  throw new Error('CBOR major type '+maj+' not supported');
}
function cborDecode(hex){ return dec(fromHex(hex),0)[0]; }

// ── Blockfrost helper ─────────────────────────────────────────
async function bf(path){
  const r=await fetch(BF_URL+path,{headers:{'project_id':BF_KEY}});
  if(!r.ok) throw new Error('Blockfrost '+path+': HTTP '+r.status);
  return r.json();
}

function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.innerHTML=msg; el.className=cls||'';
}

// ── Parse one UTxO hex → {txHash, txIndex, lovelace, pureAda} ─
function parseUtxo(hex){
  const u=cborDecode(hex);
  // u is [input, output] where input=[hash,idx], output=[addr,value] or {0:addr,1:value}
  const [input,output]=u;
  const [txHash,txIndex]=input;
  const val = Array.isArray(output) ? output[1] : output[1];
  let lovelace, pureAda;
  if(typeof val==='number'){lovelace=val;pureAda=true;}
  else if(Array.isArray(val)){lovelace=val[0];pureAda=false;}
  else{lovelace=0;pureAda=false;}
  return{txHash,txIndex,lovelace,pureAda};
}

// ── Main mint function ────────────────────────────────────────
async function mint(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  try{
    if(!window.cardano?.lace) throw new Error('Lace wallet not found. Install Lace and switch to Preprod.');
    setStatus('Connecting to Lace…');
    const api=await window.cardano.lace.enable();

    // ── Address & PKH ──
    setStatus('Getting wallet address…');
    const changeAddrHex=await api.getChangeAddress();
    // Lace CIP-30 returns CBOR-encoded addresses (byte string wrapper).
    // Raw Cardano address headers are 0x00,0x01,0x20,0x21,0x40,0x41,0x60,0x61 etc.
    // CBOR byte-string prefix for 29-57 byte addresses is 0x58 or 0x59 — never a valid addr header.
    // So: if first byte is 0x58/0x59, CBOR-decode to get raw bytes; otherwise already raw.
    let addrBytes;
    {
      const fb=parseInt(changeAddrHex.slice(0,2),16);
      if(fb===0x58||fb===0x59){
        const decoded=cborDecode(changeAddrHex);
        addrBytes=(decoded instanceof Uint8Array)?decoded:fromHex(changeAddrHex);
      } else {
        addrBytes=fromHex(changeAddrHex);
      }
    }
    if(addrBytes.length<29) throw new Error('Address too short — '+addrBytes.length+' bytes');
    const pkh=addrBytes.slice(1,29); // PKH is always bytes 1-28 of raw address
    setStatus('PKH: '+toHex(pkh));

    // Native script CBOR: [0, pkh_bytes]  (ScriptPubkey)
    const nativeScriptCbor=ea([eu(0),eb(pkh)]);

    // ── Pick best UTxO ──
    setStatus('Scanning UTxOs…');
    const rawUtxos=await api.getUtxos();
    if(!rawUtxos?.length) throw new Error('No UTxOs in wallet');

    let best=null;
    for(const raw of rawUtxos){
      try{
        const u=parseUtxo(raw);
        // Prefer pure-ADA UTxOs; pick largest lovelace
        if(u.pureAda && (!best||u.lovelace>best.lovelace)) best=u;
      }catch(_){}
    }
    if(!best){
      // Fall back to any UTxO if no pure-ADA found
      for(const raw of rawUtxos){
        try{
          const u=parseUtxo(raw);
          if(!best||u.lovelace>best.lovelace) best=u;
        }catch(_){}
      }
    }
    if(!best) throw new Error('Could not parse any UTxO');
    const needed=TOKEN_LOVELACE+FEE+1000000;
    if(best.lovelace<needed)
      throw new Error('Need >'+(needed/1e6).toFixed(2)+' ADA in one UTxO. Largest found: '+(best.lovelace/1e6).toFixed(2)+' ADA');

    const change=best.lovelace-TOKEN_LOVELACE-FEE;
    setStatus(
      'Using UTxO: '+toHex(best.txHash)+'#'+best.txIndex+
      '<br>ADA in: '+(best.lovelace/1e6).toFixed(2)+
      '  Fee: '+(FEE/1e6)+
      '  Change: '+(change/1e6).toFixed(2)
    );

    // ── Encode transaction ──
    const policyIdBytes=fromHex(POLICY_ID);
    const assetName=new TextEncoder().encode('TCT');

    // Input: [txHash, txIndex]
    const txIn=ea([eb(best.txHash),eu(best.txIndex)]);

    // Token output value: [lovelace, {policyId: {assetName: 1}}]
    const tokenValue=ea([
      eu(TOKEN_LOVELACE),
      em([[eb(policyIdBytes), em([[eb(assetName),eu(1)]])]])
    ]);
    const tokenOut=ea([eb(addrBytes),tokenValue]);

    // Change output: [addr, lovelace]
    const changeOut=ea([eb(addrBytes),eu(change)]);

    // Mint: {policyId: {assetName: 1}}
    const mintField=em([[eb(policyIdBytes), em([[eb(assetName),ei(1)]])]]);

    // Tx body map: {0:[inputs], 1:[outputs], 2:fee, 9:mint}
    const txBody=em([
      [eu(0), ea([txIn])],       // inputs as plain array (Babbage-compat)
      [eu(1), ea([tokenOut,changeOut])],
      [eu(2), eu(FEE)],
      [eu(9), mintField]
    ]);

    // Unsigned tx: [body, {}, true, null]
    const unsignedTx=ea([txBody, em([]), CTRUE, CNULL]);

    // ── Sign ──
    setStatus('Please approve in Lace…');
    const witHex=await api.signTx(toHex(unsignedTx), true); // true = partial

    // Parse returned witness set {0: [[vkey,sig],...]}
    const retWit=cborDecode(witHex);
    const vkeyWits=retWit[0]; // array of [vkey_bytes, sig_bytes]

    // Build final witness set: {0: #6.258([[vkey,sig]]), 1: [nativeScr
