<html lang="en">

<meta charset="UTF-8"/>

<title>Post a Load — Midnight Loadboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a12;color:#e0e0e0;font-family:Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;background:#12121e;border-bottom:1px solid #2a2a3e;padding:16px 32px;display:flex;align-items:center;gap:12px}
  header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:0.5px}
  header a{color:#e0e0e0;text-decoration:none}
  .nav-link{margin-left:auto;font-size:12px;font-weight:700;color:#5c5cff;text-decoration:none;border:1px solid #5c5cff;border-radius:6px;padding:5px 12px}
  .nav-link:hover{background:#1a1a3a}

  .hero{width:100%;max-width:640px;padding:60px 24px 32px;text-align:center}
  .hero h2{font-size:30px;font-weight:700;color:#fff;margin-bottom:12px}
  .hero p{color:#888;font-size:15px;line-height:1.7;margin-bottom:8px}
  .badge{display:inline-block;background:#1a1a2a;border:1px solid #5c5cff;border-radius:20px;padding:6px 18px;font-size:12px;font-weight:700;color:#5c5cff;margin-bottom:24px;letter-spacing:0.5px}

  .why-wrap{width:100%;max-width:640px;padding:0 24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .why-card{background:#12121e;border:1px solid #2a2a3e;border-radius:10px;padding:16px 18px}
  .why-card h4{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px}
  .why-card p{font-size:12px;color:#888;line-height:1.5}

  .form-wrap{width:100%;max-width:640px;padding:0 24px 60px}
  .form-card{background:#12121e;border:1px solid #2a2a3e;border-radius:14px;padding:32px}
  .form-card h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:24px}

  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:#0a0a12;border:1px solid #2a2a3e;border-radius:8px;color:#e0e0e0;font-size:14px;padding:11px 14px;outline:none;font-family:Helvetica,Arial,sans-serif}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#5c5cff}
  .form-group select option{background:#0a0a12}
  .form-group textarea{resize:vertical;min-height:80px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#5c5cff;margin-bottom:14px;margin-top:8px}
  .divider{border:none;border-top:1px solid #1a1a2e;margin:24px 0}
